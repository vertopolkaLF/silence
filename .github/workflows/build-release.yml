name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      publish_chocolatey:
        description: "Push package to Chocolatey after creating the GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content 'Silence!.csproj'
          $version = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1

          if (-not $version) {
            throw 'Version not found in Silence!.csproj.'
          }

          "value=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build portable app bundles
        shell: pwsh
        run: .\publish-release.ps1

      - name: Upload portable build layout
        uses: actions/upload-artifact@v4
        with:
          name: portable-layout-v${{ steps.version.outputs.value }}
          path: |
            releases/silence-v${{ steps.version.outputs.value }}-win-*
            releases/*.zip
          if-no-files-found: error
          retention-days: 14

  installers:
    needs: build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.build.outputs.version }}
          path: releases

      - name: Build installers
        shell: pwsh
        run: .\build-installers.ps1

      - name: Upload installer assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases/*-setup.exe
          if-no-files-found: error
          retention-days: 14

  github_release:
    needs:
      - build
      - installers
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.build.outputs.version }}
          path: releases

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.release_tag }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path releases -File |
            Where-Object { $_.Name -like '*.zip' -or $_.Name -like '*-setup.exe' } |
            Sort-Object Name

          if (-not $files) {
            throw 'No release files found in releases.'
          }

          $assetPaths = $files.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release view $env:TAG_NAME *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assetPaths --clobber
            gh release edit $env:TAG_NAME --latest
          }
          else {
            gh release create $env:TAG_NAME $assetPaths --title "silence! $env:TAG_NAME" --generate-notes --latest
          }

  chocolatey:
    needs:
      - build
      - installers
      - github_release
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases

      - name: Build Chocolatey package
        shell: pwsh
        run: >
          .\build-chocolatey-release.ps1
          -Version '${{ needs.build.outputs.version }}'
          -ReleaseTag '${{ needs.build.outputs.release_tag }}'
          -OutputDir 'releases'
          -InstallerX86Path 'releases\silence-v${{ needs.build.outputs.version }}-x86-setup.exe'
          -InstallerX64Path 'releases\silence-v${{ needs.build.outputs.version }}-x64-setup.exe'

      - name: Upload Chocolatey package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package-v${{ needs.build.outputs.version }}
          path: releases/*.nupkg
          if-no-files-found: error
          retention-days: 14

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Attach Chocolatey package to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.release_tag }}
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path releases -Filter *.nupkg -File

          if (-not $packages) {
            throw 'No Chocolatey package found in releases.'
          }

          $packagePaths = $packages.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release upload $env:TAG_NAME $packagePaths --clobber

      - name: Push Chocolatey package
        if: inputs.publish_chocolatey
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            throw 'CHOCOLATEY_API_KEY secret is required when publish_chocolatey is enabled.'
          }

          .\build-chocolatey-release.ps1 `
            -Version '${{ needs.build.outputs.version }}' `
            -ReleaseTag '${{ needs.build.outputs.release_tag }}' `
            -OutputDir 'releases' `
            -InstallerX86Path 'releases\silence-v${{ needs.build.outputs.version }}-x86-setup.exe' `
            -InstallerX64Path 'releases\silence-v${{ needs.build.outputs.version }}-x64-setup.exe' `
            -Push `
            -ApiKey $env:CHOCOLATEY_API_KEY
