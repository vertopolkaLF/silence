name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      publish_chocolatey:
        description: "Push package to Chocolatey after creating the GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  precheck:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_published: ${{ steps.release_check.outputs.published }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content 'Silence!.csproj'
          $version = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1

          if (-not $version) {
            throw 'Version not found in Silence!.csproj.'
          }

          "value=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Check existing GitHub release
        id: release_check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releaseUri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG"

          try {
            $release = Invoke-RestMethod -Uri $releaseUri -Headers $headers

            if ($release.draft) {
              Write-Host "Draft release $env:RELEASE_TAG exists. Build will continue." -ForegroundColor Yellow
              "published=false" >> $env:GITHUB_OUTPUT
            }
            else {
              Write-Host "Published release $env:RELEASE_TAG already exists. Build, installers, and GitHub release will be skipped." -ForegroundColor Yellow
              "published=true" >> $env:GITHUB_OUTPUT
            }
          }
          catch {
            $statusCode = $null

            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }

            if ($statusCode -eq 404) {
              Write-Host "Release $env:RELEASE_TAG does not exist yet. Build will continue." -ForegroundColor Cyan
              "published=false" >> $env:GITHUB_OUTPUT
            }
            else {
              throw
            }
          }

  already_published:
    needs: precheck
    if: needs.precheck.outputs.release_published == 'true'
    runs-on: windows-2022

    steps:
      - name: Report published release
        shell: pwsh
        run: |
          Write-Host "Published release ${{ needs.precheck.outputs.release_tag }} already exists. Skipping build/installers/github release and reusing the published installers for Chocolatey." -ForegroundColor Yellow

  build:
    needs: precheck
    if: needs.precheck.outputs.release_published != 'true'
    runs-on: windows-2022
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build portable app bundles
        shell: pwsh
        run: .\publish-release.ps1

      - name: Upload portable build layout
        uses: actions/upload-artifact@v4
        with:
          name: portable-layout-v${{ needs.precheck.outputs.version }}
          path: |
            releases/silence-v${{ needs.precheck.outputs.version }}-win-*
            releases/*.zip
          if-no-files-found: error
          retention-days: 14

  installers:
    needs:
      - precheck
      - build
    if: needs.precheck.outputs.release_published != 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.precheck.outputs.version }}
          path: releases

      - name: Build installers
        shell: pwsh
        run: .\build-installers.ps1

      - name: Upload installer assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-assets-v${{ needs.precheck.outputs.version }}
          path: releases/*-setup.exe
          if-no-files-found: error
          retention-days: 14

  github_release:
    needs:
      - precheck
      - build
      - installers
    if: needs.precheck.outputs.release_published != 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.precheck.outputs.version }}
          path: releases

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.precheck.outputs.version }}
          path: releases

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.precheck.outputs.release_tag }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path releases -File |
            Where-Object { $_.Name -like '*.zip' -or $_.Name -like '*-setup.exe' } |
            Sort-Object Name

          if (-not $files) {
            throw 'No release files found in releases.'
          }

          $assetPaths = $files.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release view $env:TAG_NAME *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assetPaths --clobber
            gh release edit $env:TAG_NAME --latest
          }
          else {
            gh release create $env:TAG_NAME $assetPaths --title "silence! $env:TAG_NAME" --generate-notes --latest
          }

  chocolatey:
    needs:
      - precheck
      - build
      - installers
      - github_release
    if: always() && needs.precheck.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.installers.result == 'success' || needs.installers.result == 'skipped') && (needs.github_release.result == 'success' || needs.github_release.result == 'skipped')
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download installer artifacts
        if: needs.precheck.outputs.release_published != 'true'
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.precheck.outputs.version }}
          path: releases

      - name: Ensure GitHub CLI
        if: needs.precheck.outputs.release_published == 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Download installers from published GitHub release
        if: needs.precheck.outputs.release_published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.precheck.outputs.release_tag }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path releases -Force | Out-Null
          gh release download $env:TAG_NAME --dir releases --pattern "silence-v${{ needs.precheck.outputs.version }}-x86-setup.exe"
          gh release download $env:TAG_NAME --dir releases --pattern "silence-v${{ needs.precheck.outputs.version }}-x64-setup.exe"

      - name: Build Chocolatey package
        shell: pwsh
        run: >
          .\build-chocolatey-release.ps1
          -Version '${{ needs.precheck.outputs.version }}'
          -ReleaseTag '${{ needs.precheck.outputs.release_tag }}'
          -OutputDir 'releases'
          -InstallerX86Path 'releases\silence-v${{ needs.precheck.outputs.version }}-x86-setup.exe'
          -InstallerX64Path 'releases\silence-v${{ needs.precheck.outputs.version }}-x64-setup.exe'

      - name: Upload Chocolatey package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package-v${{ needs.precheck.outputs.version }}
          path: releases/*.nupkg
          if-no-files-found: error
          retention-days: 14

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Attach Chocolatey package to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.precheck.outputs.release_tag }}
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path releases -Filter *.nupkg -File

          if (-not $packages) {
            throw 'No Chocolatey package found in releases.'
          }

          $packagePaths = $packages.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release upload $env:TAG_NAME $packagePaths --clobber

      - name: Push Chocolatey package
        if: inputs.publish_chocolatey
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            throw 'CHOCOLATEY_API_KEY secret is required when publish_chocolatey is enabled.'
          }

          .\build-chocolatey-release.ps1 `
            -Version '${{ needs.precheck.outputs.version }}' `
            -ReleaseTag '${{ needs.precheck.outputs.release_tag }}' `
            -OutputDir 'releases' `
            -InstallerX86Path 'releases\silence-v${{ needs.precheck.outputs.version }}-x86-setup.exe' `
            -InstallerX64Path 'releases\silence-v${{ needs.precheck.outputs.version }}-x64-setup.exe' `
            -Push `
            -ApiKey $env:CHOCOLATEY_API_KEY
