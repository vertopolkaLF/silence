name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content 'Silence!.csproj'
          $version = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1

          if (-not $version) {
            throw 'Version not found in Silence!.csproj.'
          }

          "value=$version" >> $env:GITHUB_OUTPUT

          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -ne "v$version") {
            throw "Git tag ${{ github.ref_name }} does not match project version v$version."
          }

      - name: Build portable app bundles
        shell: pwsh
        run: .\publish-release.ps1

      - name: Upload portable build layout
        uses: actions/upload-artifact@v4
        with:
          name: portable-layout-v${{ steps.version.outputs.value }}
          path: releases
          if-no-files-found: error
          retention-days: 14

  installers:
    if: github.event_name != 'release'
    needs: build
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.build.outputs.version }}
          path: .

      - name: Build installers
        shell: pwsh
        run: .\build-installers.ps1

      - name: Upload installer assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases/*-setup.exe
          if-no-files-found: error
          retention-days: 14

  github_release:
    if: github.event_name != 'release' && github.ref_type == 'tag'
    needs:
      - build
      - installers
    runs-on: windows-2022

    steps:
      - name: Download portable build layout
        uses: actions/download-artifact@v4
        with:
          name: portable-layout-v${{ needs.build.outputs.version }}
          path: .

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path releases -File |
            Where-Object { $_.Name -like '*.zip' -or $_.Name -like '*-setup.exe' } |
            Sort-Object Name

          if (-not $files) {
            throw 'No release files found in releases.'
          }

          $assetPaths = $files.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release view $env:TAG_NAME *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assetPaths --clobber
          }
          else {
            gh release create $env:TAG_NAME $assetPaths --title "silence! $env:TAG_NAME" --generate-notes --draft
          }

  chocolatey_pack:
    if: github.event_name != 'release' && github.ref_type == 'tag'
    needs:
      - build
      - installers
      - github_release
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download installer assets
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-v${{ needs.build.outputs.version }}
          path: releases

      - name: Build Chocolatey package
        shell: pwsh
        run: >
          .\build-chocolatey-release.ps1
          -Version '${{ needs.build.outputs.version }}'
          -ReleaseTag '${{ github.ref_name }}'
          -OutputDir 'releases'
          -InstallerX86Path 'releases\silence-v${{ needs.build.outputs.version }}-x86-setup.exe'
          -InstallerX64Path 'releases\silence-v${{ needs.build.outputs.version }}-x64-setup.exe'

      - name: Upload Chocolatey package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package-v${{ needs.build.outputs.version }}
          path: releases/*.nupkg
          if-no-files-found: error
          retention-days: 14

      - name: Ensure GitHub CLI
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Attach Chocolatey package to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path releases -Filter *.nupkg -File

          if (-not $packages) {
            throw 'No Chocolatey package found in releases.'
          }

          $packagePaths = $packages.FullName | ForEach-Object { $_ -replace '\\', '/' }
          gh release upload $env:TAG_NAME $packagePaths --clobber

  chocolatey_publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check Chocolatey API key
        id: choco_key
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            Write-Host 'CHOCOLATEY_API_KEY is not configured. Skipping Chocolatey push.'
            "available=false" >> $env:GITHUB_OUTPUT
          }
          else {
            "available=true" >> $env:GITHUB_OUTPUT
          }

      - name: Ensure GitHub CLI
        if: steps.choco_key.outputs.available == 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }

      - name: Download published release installers
        if: steps.choco_key.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          gh release download $env:TAG_NAME --dir release-assets --pattern "silence-v*-x86-setup.exe"
          gh release download $env:TAG_NAME --dir release-assets --pattern "silence-v*-x64-setup.exe"

      - name: Push Chocolatey package
        if: steps.choco_key.outputs.available == 'true'
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          $version = '${{ github.event.release.tag_name }}'.TrimStart('v')
          $x86 = Get-ChildItem release-assets -Filter "silence-v*-x86-setup.exe" | Select-Object -First 1
          $x64 = Get-ChildItem release-assets -Filter "silence-v*-x64-setup.exe" | Select-Object -First 1

          if (-not $x86 -or -not $x64) {
            throw 'Published release installers were not downloaded successfully.'
          }

          .\build-chocolatey-release.ps1 `
            -Version $version `
            -ReleaseTag '${{ github.event.release.tag_name }}' `
            -OutputDir 'releases' `
            -InstallerX86Path $x86.FullName `
            -InstallerX64Path $x64.FullName `
            -Push `
            -ApiKey $env:CHOCOLATEY_API_KEY

      - name: Upload published Chocolatey package
        if: steps.choco_key.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: published-chocolatey-package-${{ github.event.release.tag_name }}
          path: releases/*.nupkg
          if-no-files-found: error
          retention-days: 14
